# Deploy the public app-web static bundle to GitHub Pages.
name: Deploy app-web to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_STELIS_RELAY_API_URL: ${{ vars.VITE_STELIS_RELAY_API_URL }}
      VITE_STELIS_UI_MODE: relay
      VITE_REPO_DOCS_BASE_URL: https://github.com/${{ github.repository }}/blob/main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check required build variables
        run: |
          test -n "$VITE_STELIS_RELAY_API_URL" || {
            echo "Set the repository variable VITE_STELIS_RELAY_API_URL to the app-api /relay URL."
            exit 1
          }

      - name: Build app-web
        run: |
          npm run build -w @stelis/contracts
          npm run build -w @stelis/core-relay
          npm run build -w @stelis/sdk
          npm run build -w @stelis/app-web

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload app-web artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/app-web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
